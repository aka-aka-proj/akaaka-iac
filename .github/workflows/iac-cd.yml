name: Supabase IaC CD - main deploy

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/iac-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Push DB and deploy functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          [ -n "$SUPABASE_PROJECT_REF" ] || { echo "Missing SUPABASE_PROJECT_REF"; exit 1; }

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: |
          if [ -n "$SUPABASE_DB_PASSWORD" ]; then
            supabase db push --password "$SUPABASE_DB_PASSWORD"
          else
            supabase db push
          fi

      - name: Deploy Supabase Edge Functions
        run: |
          function_dirs="$(find supabase/functions -mindepth 1 -maxdepth 1 -type d 2>/dev/null || true)"
          if [ -z "$function_dirs" ]; then
            echo "No function directories under supabase/functions; skipping deploy."
            exit 0
          fi
          while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            fn="$(basename "$dir")"
            echo "Deploying function: $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done <<< "$function_dirs"
