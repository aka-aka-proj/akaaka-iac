name: IaC CI – PR Check (fmt / validate / plan)

# ─────────────────────────────────────────────────────────────────
# 觸發條件：針對 main 的 PR，且變更範圍在 terraform/ 目錄內。
# 避免 frontend/backend PR 無謂觸發此 workflow。
# ─────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/iac-ci.yml"

permissions:
  contents: read
  pull-requests: write  # 用於將 plan 結果寫回 PR comment

env:
  TF_VERSION: "1.9.5"
  TF_WORKING_DIR: terraform
  # 可在 repo / org Variables 中設定，不含敏感值
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

jobs:
  # ── 格式檢查 ──────────────────────────────────────────────────
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive -diff
        # 若格式不符，CI 失敗並顯示 diff，請在本地執行 `terraform fmt -recursive` 修正

  # ── Validate ──────────────────────────────────────────────────
  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init (local backend, skip remote state)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Validate configuration
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  # ── Plan (staging) ────────────────────────────────────────────
  plan-staging:
    name: terraform plan (staging)
    runs-on: ubuntu-latest
    needs: validate
    environment: staging   # GitHub Environment – 可設定必要 reviewer 或 secrets
    env:
      # AWS 憑證由 GitHub OIDC 取得，無需長期存放 Access Key
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_ARN_STAGING }}
    permissions:
      contents: read
      id-token:  write   # 允許 OIDC token 請求
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_STAGING }}" \
            -backend-config="key=akaaka/staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="envs/staging/terraform.tfvars" \
            -out=staging.tfplan \
            -no-color \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan result as PR comment
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const trimmed = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n…（已截斷，請查看 Actions log 取得完整輸出）'
              : plan;

            const status = '${{ steps.plan.outputs.exitcode }}' === '0' ? '✅' : '❌';
            const body = [
              `## ${status} Terraform Plan – \`staging\``,
              '',
              '<details><summary>展開 plan 輸出</summary>',
              '',
              '```hcl',
              trimmed,
              '```',
              '',
              '</details>',
              '',
              `> Commit: \`${{ github.sha }}\` | Workflow: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan – `staging`')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
