name: Supabase IaC CI - PR checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/iac-ci.yml"

permissions:
  contents: read

jobs:
  supabase-checks:
    name: Verify ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        target:
          - name: migrations
            path: supabase/migrations
          - name: functions
            path: supabase/functions
    steps:
      - uses: actions/checkout@v4

      - name: Ensure target path exists
        run: |
          if [ ! -d "${{ matrix.target.path }}" ]; then
            echo "Missing required path: ${{ matrix.target.path }}"
            exit 1
          fi

      - name: Check migrations naming
        if: matrix.target.name == 'migrations'
        run: |
          invalid=0
          while IFS= read -r file; do
            base="$(basename "$file")"
            if ! echo "$base" | grep -Eq '^[0-9]{14}_.+\.sql$'; then
              echo "Invalid migration filename: $base"
              invalid=1
            fi
          done < <(find supabase/migrations -maxdepth 1 -type f -name '*.sql')
          if [ "$invalid" -ne 0 ]; then
            exit 1
          fi

      - name: Check functions entrypoints
        if: matrix.target.name == 'functions'
        run: |
          missing=0
          while IFS= read -r dir; do
            if [ -f "$dir/index.ts" ] || [ -f "$dir/index.js" ]; then
              continue
            fi
            echo "Missing function entrypoint in $dir (expected index.ts or index.js)"
            missing=1
          done < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d)
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
